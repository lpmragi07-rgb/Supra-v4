# Evolution API local — PostgreSQL + Redis + API
# Uso: docker compose up -d
# Parar: docker compose down

services:
  postgres:
    image: postgres:15-alpine
    container_name: supra-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: supra-evolution-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: supra-evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-sua-chave-secreta}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Deixe vazio para buscar versão do WhatsApp automaticamente
      CONFIG_SESSION_PHONE_VERSION: ""
      CONFIG_SESSION_PHONE_CLIENT: "Evolution API"
      CONFIG_SESSION_PHONE_NAME: Chrome
      # Banco de dados
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      # Cache Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

  # Worker de disparo — processa campanhas ativas automaticamente
  worker:
    image: node:20-alpine
    container_name: supra-worker
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../worker:/app
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-sua-chave-secreta}
      BATCH_SIZE: "5"
      POLL_INTERVAL_MS: "5000"
      SEND_DELAY_MS: "1200"
      WHATSAPP_MESSAGE_TEMPLATE: "Olá! Somos da Supra V4. Identificamos que a {{empresa}} pode se beneficiar das nossas soluções. Podemos conversar?"
    command: sh -c "npm install --omit=dev && node index.mjs"
    depends_on:
      - evolution-api

volumes:
  evolution_postgres:
  evolution_instances:
  evolution_store:
